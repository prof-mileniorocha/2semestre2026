<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Produto 1</title>
    <link rel="stylesheet" href="style.css">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body class="bg-light">
    <main class="container py-4 py-lg-5">
        <div class="row g-4 g-lg-5 align-items-start">
            <section class="col-12 col-lg-7">
                <div class="card border-0 shadow-sm">
                    <div class="card-body p-2 p-md-3">
                        <div class="row g-3">
                            <div class="col-2 col-md-2">
                                <div class="d-grip gap-2">
                                    <button class="btn btn-outline-secondary" type="button">
                                        <img src="/imagens/tenis2/imagem1.png" class="d-block w-100" alt="...">
                                    </button>
                                    <button class="btn btn-outline-secondary" type="button">
                                        <img src="/imagens/tenis2/imagem2.png" class="d-block w-100" alt="...">
                                    </button>
                                    <button class="btn btn-outline-secondary" type="button">
                                        <img src="/imagens/tenis2/imagem3.png" class="d-block w-100" alt="...">
                                    </button>
                                </div>
                            </div>
                            <div class="col-10 col-md-10">
                                <div class="card border-0 rounded-3" style="background-color: #f0f0f2;">
                                    <div class="ratio ratio-1x1">
                                        <img src="/imagens/tenis2/imagem1.png" alt="Tenis Adidas"
                                            class="img-fluid p-3 p-md-4" style="object-fit: contain;">
                                    </div>
                                    <div class="text-center fw-bold-py-2" style="background-color: #d7ff2f;">-42% OFF
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </section>

            <section class="col-12 col-lg-5">
                <div class="card border-0 shadow-sm h-100">
                    <div class="card-body p-3 p-md-4">
                        <h1 class="h2 fw-bold md-3 text-start">Tênis Nike BA</h1>
                        <p class="mb-2"><b>Ref: </b> FB9-9335-205-34</p>
                        <p class="mb-4"><b>Cor: </b> Branco Azul</p>

                        <div class="md-4">
                            <p class="fw-bold mb-2">Variações: </p>
                            <div class="d-flex flex-wrap gap-2">
                                <button class="btn btn-outline-dark btn-sm">Preto</button>
                                <button class="btn btn-outline-dark btn-sm">Grafite</button>
                                <button class="btn btn-outline-primary btn-sm">Branco Azul</button>
                                <button class="btn btn-outline-secondary btn-sm">Off White</button>
                                <button class="btn btn-outline-secondary btn-sm" disabled>Areia</button>
                            </div>
                        </div>

                        <div class="md-4">
                            <p class="d-flex fw-bold mb-2">Tamanhos: </p>
                            <div class="d-flex flex-wrap gap-2">
                                <button class="btn btn-outline-dark btn-sm fw-semibold">34</button>
                                <button class="btn btn-outline-dark btn-sm fw-semibold">35</button>
                                <button class="btn btn-outline-dark btn-sm fw-semibold">36</button>
                                <button class="btn btn-outline-dark btn-sm fw-semibold">37</button>
                                <button class="btn btn-outline-dark btn-sm fw-semibold">38</button>
                                <button class="btn btn-outline-dark btn-sm fw-semibold">39</button>
                                <button class="btn btn-outline-dark btn-sm fw-semibold">40</button>
                                <button class="btn btn-outline-dark btn-sm fw-semibold">41</button>
                                <button class="btn btn-outline-secondary btn-sm fw-semibold" disabled>42</button>
                                <button class="btn btn-outline-dark btn-sm fw-semibold">43</button>
                                <button class="btn btn-outline-secondary btn-sm fw-semibold" disabled>44</button>
                            </div>
                        </div>
                        <br>
                        <div class="card border rounded-3">
                            <div class="card-body">
                                <p class="text-secondary text-decoration-line-through mb-1">R$ 299,90</p>
                                <p class="mb-2">
                                    <span class="badge text-dark" style="background-color: #d7ff2f;">42% OFF</span>
                                </p>
                                <p class="display-6 fw-bold mb-1">R$ 199,99</p>
                                <p class="text-secondary md-3">até 2x de <b>R$ 100,00</b> sem juros </p>
                                <span class="badge bg-success-subtle text-success-emphasis border border-success-subtle">Frete Grátis</span>
                            </div>
                        </div>
                    </div>
            </section>
        </div>
    </main>
</body>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
    crossorigin="anonymous"></script>

</html>
